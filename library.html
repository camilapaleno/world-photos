<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>my photos — library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap" rel="stylesheet">
  <script src="transitions.js"></script>
  <script src="theme.js"></script>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      background: #f5f3ef;
      font-family: 'DM Mono', monospace;
    }

    /* ── Navbar ── */
    .navbar {
      position: sticky;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: #f5f3ef;
    }

    .nav-brand,
    .nav-title {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.04em;
      color: #111;
      text-decoration: none;
      padding: 4px 8px;
      border-radius: 3px;
      transition: background 0.15s;
    }

    .nav-title:hover {
      background: #fffbe6;
    }

    .nav-actions {
      position: relative;
    }

    .nav-plus {
      font-family: 'DM Mono', monospace;
      font-size: 18px;
      line-height: 1;
      color: #111;
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 8px 4px;
      border-radius: 3px;
      transition: background 0.15s;
    }

    .nav-plus:hover {
      background: #fffbe6;
    }

    .nav-dropdown {
      position: absolute;
      right: 0;
      top: calc(100% + 4px);
      background: #fff;
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 5px;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-4px);
      transition: opacity 0.15s, transform 0.15s;
      min-width: 90px;
    }

    .nav-dropdown.open {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .nav-dropdown a {
      display: block;
      padding: 9px 16px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.03em;
      color: #111;
      text-decoration: none;
      transition: background 0.15s;
    }

    .nav-dropdown a:hover {
      background: #fffbe6;
    }

    /* ── Library layout ── */
    .library {
      padding: 32px 0 64px;
    }

    /* ── Single reel ── */
    .reel {
      margin-bottom: 48px;
    }

    .reel-header {
      display: flex;
      align-items: baseline;
      gap: 14px;
      padding: 0 20px 10px;
    }

    .reel-title {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: #111;
    }

    .reel-location {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: rgba(0,0,0,0.38);
      text-transform: uppercase;
      flex: 1;
    }

    .reel-year {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: rgba(0,0,0,0.28);
    }

    .reel-link {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: rgba(0,0,0,0.4);
      text-decoration: none;
      padding: 3px 7px;
      border-radius: 3px;
      transition: background 0.15s, color 0.15s;
    }

    .reel-link:hover {
      background: #fffbe6;
      color: #111;
    }

    /* ── Scrolling strip ── */
    .reel-viewport {
      overflow: hidden;
      width: 100%;
    }

    .reel-track {
      display: flex;
      gap: 0px;
      width: max-content;
      will-change: transform;
    }

    .reel-track.left {
      animation: reelLeft var(--dur, 35s) linear infinite;
    }

    .reel-track.right {
      animation: reelRight var(--dur, 35s) linear infinite;
    }

    @keyframes reelLeft {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    @keyframes reelRight {
      0%   { transform: translateX(-50%); }
      100% { transform: translateX(0); }
    }

    .reel-img {
      height: 160px;
      width: auto;
      aspect-ratio: 3/2;
      object-fit: cover;
      display: block;
      flex-shrink: 0;
    }

    /* ── Dark mode ── */
    html.dark body,
    html.dark .navbar { background: #111; }
    html.dark .nav-brand,
    html.dark .nav-title { color: #999; }
    html.dark .nav-title:hover { background: rgba(255,255,255,0.06); }
    html.dark .nav-plus { color: #999; }
    html.dark .nav-plus:hover { background: rgba(255,255,255,0.06); }
    html.dark .nav-dropdown { background: #1c1c1c; border-color: rgba(255,255,255,0.1); }
    html.dark .nav-dropdown a { color: #999; }
    html.dark .nav-dropdown a:hover { background: rgba(255,255,255,0.06); color: #ddd; }
    html.dark .reel-title { color: #bbb; }
    html.dark .reel-location { color: rgba(255,255,255,0.25); }
    html.dark .reel-year { color: rgba(255,255,255,0.2); }
    html.dark .reel-link { color: rgba(255,255,255,0.3); }
    html.dark .reel-link:hover { background: rgba(255,255,255,0.06); color: #ddd; }
    .site-footer { display: flex; align-items: center; gap: 12px; padding: 24px 20px 32px; font-size: 10px; font-weight: 300; color: rgba(0,0,0,0.35); letter-spacing: 0.04em; }
    .footer-social { display: flex; gap: 10px; align-items: center; }
    .footer-social a { color: rgba(0,0,0,0.35); text-decoration: none; transition: color 0.15s; display: flex; align-items: center; }
    .footer-social a:hover { color: #111; }
    html.dark .site-footer { color: rgba(255,255,255,0.25); }
    html.dark .footer-social a { color: rgba(255,255,255,0.25); }
    html.dark .footer-social a:hover { color: #ccc; }
  </style>
</head>
<body>

  <nav class="navbar">
    <span class="nav-brand">pcmila</span>
    <a href="home.html" class="nav-title">my photos</a>
    <div class="nav-actions">
      <button class="nav-plus" id="navPlus">+</button>
      <div class="nav-dropdown" id="navDropdown">
        <a href="library.html">library</a>
        <a href="canvas.html">canvas</a>
        <a href="map.html">map</a>
      </div>
    </div>
  </nav>

  <div class="library" id="library"></div>

  <script src="data.js"></script>
  <script>
    // Navbar dropdown
    const navPlus = document.getElementById('navPlus');
    const navDropdown = document.getElementById('navDropdown');
    navPlus.addEventListener('click', e => {
      e.stopPropagation();
      navDropdown.classList.toggle('open');
    });
    document.addEventListener('click', () => navDropdown.classList.remove('open'));

    // ── Toggle ───────────────────────────────────────────────────────────────
    // 'scroll' — reels move left/right tied to page scroll position
    // 'auto'   — reels animate continuously via CSS keyframes
    const REEL_MODE = 'scroll';

    // Scroll mode: px of horizontal movement per px scrolled (tweak for more/less effect)
    const SCROLL_SPEED = 0.05;

    // Build library reels from shared PHOTOS data
    const library = document.getElementById('library');
    const scrollTracks = []; // collected for scroll-mode rAF loop

    PHOTOS.forEach((loc, index) => {
      // Repeat enough times so scrollWidth/2 > viewport width (needed for seamless wrap).
      // Estimate image width from aspect-ratio (3/2) × height (120px) = 180px.
      const IMG_W  = 180;
      const REPEAT = Math.max(2, Math.ceil((window.innerWidth * 2) / (loc.photos.length * IMG_W)));
      const allImgs = Array.from({ length: REPEAT }, () => loc.photos).flat();

      const reel = document.createElement('div');
      reel.className = 'reel';

      // Header row
      const header = document.createElement('div');
      header.className = 'reel-header';

      const titleEl = document.createElement('span');
      titleEl.className = 'reel-title';
      titleEl.textContent = loc.title;

      const locEl = document.createElement('span');
      locEl.className = 'reel-location';
      locEl.textContent = loc.location;

      const yearEl = document.createElement('span');
      yearEl.className = 'reel-year';
      yearEl.textContent = loc.year ?? '';

      const linkEl = document.createElement('a');
      linkEl.className = 'reel-link';
      linkEl.href = loc.url;
      linkEl.textContent = 'see complete album →';

      header.appendChild(titleEl);
      header.appendChild(locEl);
      header.appendChild(yearEl);
      header.appendChild(linkEl);

      // Scrolling strip
      const viewport = document.createElement('div');
      viewport.className = 'reel-viewport';

      const track = document.createElement('div');
      track.className = 'reel-track';

      if (REEL_MODE === 'auto') {
        // CSS keyframe animation, direction alternates per reel
        track.classList.add(index % 2 === 0 ? 'left' : 'right');
        const dur = 200 + (index % 5) * 5;
        track.style.setProperty('--dur', `${dur}s`);
      } else {
        // Scroll mode: even reels move left (-1), odd move right (+1)
        track.dataset.dir = index % 2 === 0 ? '-1' : '1';
        scrollTracks.push(track);
      }

      allImgs.forEach(src => {
        const img = document.createElement('img');
        img.className = 'reel-img';
        img.src = src;
        img.alt = loc.title;
        img.draggable = false;
        track.appendChild(img);
      });

      viewport.appendChild(track);
      reel.appendChild(header);
      reel.appendChild(viewport);
      library.appendChild(reel);
    });

    // ── Scroll-driven reel movement ──────────────────────────────────────────
    if (REEL_MODE === 'scroll') {
      const EASE = 0.09;

      // Half the track width is the seamless loop period: translateX(x) and
      // translateX(x - halfWidth) show identical content because the strip
      // is two identical halves. Images have explicit height + aspect-ratio
      // so scrollWidth is layout-ready immediately after DOM insertion.
      const halfWidths = scrollTracks.map(t => t.scrollWidth / 2);

      // Right-moving tracks start at -halfWidth/2 so content fills both
      // sides of the viewport at scrollY=0 (no empty left edge).
      const starts = scrollTracks.map((track, i) =>
        Number(track.dataset.dir) === 1 ? -halfWidths[i] / 2 : 0
      );

      // current/target are unbounded raw offsets — we lerp these smoothly.
      // The wrap is applied only at display time, so lerp never jumps.
      const current = [...starts];
      const target  = [...starts];

      // Wrap x to [-hw, 0): visual seam is invisible because both ends of
      // the half-period show identical repeated content.
      function wrap(x, hw) {
        return -((((-x) % hw) + hw) % hw);
      }

      // Apply initial positions before first paint
      scrollTracks.forEach((track, i) => {
        track.style.transform = `translateX(${wrap(starts[i], halfWidths[i])}px)`;
      });

      window.addEventListener('scroll', () => {
        const sy = window.scrollY;
        scrollTracks.forEach((track, i) => {
          target[i] = starts[i] + sy * SCROLL_SPEED * Number(track.dataset.dir);
        });
      }, { passive: true });

      (function loop() {
        requestAnimationFrame(loop);
        scrollTracks.forEach((track, i) => {
          current[i] += (target[i] - current[i]) * EASE;
          track.style.transform = `translateX(${wrap(current[i], halfWidths[i])}px)`;
        });
      })();
    }
  </script>
