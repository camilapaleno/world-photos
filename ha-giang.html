<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>my photos — Hà Giang</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <script src="transitions.js"></script>
  <script src="theme.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; min-height: 100%; background: #f5f3ef; font-family: 'DM Mono', monospace; }
    .page { display: grid; grid-template-columns: 64px 1fr 220px; column-gap: 40px; max-width: 2160px; margin: 0 auto; padding: 48px 32px 120px; align-items: start; }
    .back { position: sticky; top: 48px; display: flex; align-items: flex-start; padding-top: 6px; }
    .back a { font-family: 'DM Mono', monospace; font-size: 16px; color: rgba(0,0,0,0.4); text-decoration: none; transition: color 0.15s; line-height: 1; }
    .back a:hover { color: #111; }
    .content { min-width: 0; }
    .content-title { font-family: 'DM Mono', monospace; font-size: clamp(1.8rem, 3.5vw, 2.8rem); font-weight: 400; color: #111; line-height: 1.15; margin-bottom: 20px; }
    .content-body { font-family: 'DM Mono', monospace; font-size: 11.5px; font-weight: 300; line-height: 1.75; color: rgba(0,0,0,0.6); margin-bottom: 40px; }
    .content-body p + p { margin-top: 16px; }
    .photo { width: 100%; margin-bottom: 16px; border-radius: 6px; overflow: hidden; background: #e8e6e2; }
    .photo img { width: 100%; height: auto; display: block; border-radius: 6px; }
    .meta { position: sticky; top: 48px; }
    .meta-group { margin-bottom: 24px; }
    .meta-label { font-size: 10px; font-weight: 500; letter-spacing: 0.08em; color: rgba(0,0,0,0.35); text-transform: uppercase; margin-bottom: 4px; }
    .meta-value { font-size: 11.5px; font-weight: 300; color: #111; line-height: 1.5; }

    @media (max-width: 768px) {
      .page { display: flex; flex-direction: column; padding: 24px 20px 80px; }
      .back { position: static; order: 1; margin-bottom: 16px; }
      .content { display: contents; }
      .content-header { order: 2; margin-bottom: 24px; }
      .content-photos { order: 4; }
      .meta { position: static; order: 3; margin-bottom: 32px; }
    }
    /* ── Dark mode ── */
    html.dark body { background: #111; }
    html.dark .back a { color: rgba(255,255,255,0.28); }
    html.dark .back a:hover { color: #eee; }
    html.dark .content-title { color: #ccc; }
    html.dark .content-body { color: rgba(255,255,255,0.42); }
    html.dark .photo { background: #1e1e1e; }
    html.dark .meta-label { color: rgba(255,255,255,0.28); }
    html.dark .meta-value { color: #ccc; }
    .site-footer { display: flex; align-items: center; gap: 12px; padding: 20px 32px 32px; font-size: 10px; font-weight: 300; color: rgba(0,0,0,0.35); letter-spacing: 0.04em; }
    .footer-social { display: flex; gap: 10px; align-items: center; }
    .footer-social a { color: rgba(0,0,0,0.35); text-decoration: none; transition: color 0.15s; display: flex; align-items: center; }
    .footer-social a:hover { color: #111; }
    html.dark .site-footer { color: rgba(255,255,255,0.25); }
    html.dark .footer-social a { color: rgba(255,255,255,0.25); }
    html.dark .footer-social a:hover { color: #ccc; }
  </style>
</head>
<body>

      <div class="content-body">
        <p>(On a motorbike)</p>

      </div>
      <div class="content-photos">

      <div class="photo"><img src="photos/ha%20giang/DSC02095.webp" alt=""></div>
      <div class="photo"><img src="photos/ha%20giang/DSC02119.webp" alt=""></div>
