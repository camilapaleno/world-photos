<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>my photos — map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap" rel="stylesheet">
  <script src="transitions.js"></script>
  <script src="theme.js"></script>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #fff;
      overflow: hidden;
      font-family: 'DM Mono', monospace;
    }

    /* ── Navbar ── */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
    }

    .nav-brand,
    .nav-title {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.04em;
      color: #111;
      text-decoration: none;
      padding: 4px 8px;
      border-radius: 3px;
      transition: background 0.15s;
    }

    .nav-title:hover {
      background: #fffbe6;
    }

    .nav-actions {
      position: relative;
    }

    .nav-plus {
      font-family: 'DM Mono', monospace;
      font-size: 18px;
      line-height: 1;
      color: #111;
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 8px 4px;
      border-radius: 3px;
      transition: background 0.15s;
    }

    .nav-plus:hover {
      background: #fffbe6;
    }

    .nav-dropdown {
      position: absolute;
      right: 0;
      top: calc(100% + 4px);
      background: #fff;
      border: 1px solid rgba(0, 0, 0, 0.1);
      border-radius: 5px;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-4px);
      transition: opacity 0.15s, transform 0.15s;
      min-width: 90px;
    }

    .nav-dropdown.open {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .nav-dropdown a {
      display: block;
      padding: 9px 16px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.03em;
      color: #111;
      text-decoration: none;
      transition: background 0.15s;
    }

    .nav-dropdown a:hover {
      background: #fffbe6;
    }

    /* ── Loading overlay ── */
    #loader {
      position: fixed;
      inset: 0;
      background: #0d0d0d;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.5s ease;
    }

    #loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
      margin: 0 5px;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .loader-dot:nth-child(2) { animation-delay: 0.2s; }
    .loader-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40%            { transform: scale(1.0); opacity: 1.0; }
    }

    /* ── Viewport ── */
    #viewport {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
      cursor: grab;
    }

    #viewport.dragging {
      cursor: grabbing;
    }

    /* ── Scrolling track ── */
    #track {
      position: absolute;
      top: 0;
      left: 0;
      display: flex;
      will-change: transform;
    }

    /* ── Canvas ── */
    #map-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* ── Each map copy ── */
    .map-instance {
      position: relative;
      flex-shrink: 0;
    }

    /* ── Pins ── */
    .pin {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      transform: translate(-50%, -100%);
      cursor: pointer;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    .pin-thumb-wrap {
      position: relative;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }


    .pin-thumb {
      position: relative;
      z-index: 3;
      width: 50px;
      height: 50px;
      object-fit: cover;
      display: block;
    }

    .pin-stem {
      width: 2px;
      height: 10px;
      background: rgba(255, 255, 255, 0.85);
    }

    .pin-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.85);
    }

    /* ── Spread system ── */
    .pin-spread {
      position: absolute;
      top: 25px;
      left: 25px;
      width: 0;
      height: 0;
      pointer-events: none;
    }

    .spread-slot {
      position: absolute;
      top: 0;
      left: 0;
      width: 50px;
      height: 50px;
      margin: -25px 0 0 -25px;
      transform: translate(0px, 0px) scale(0);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.22s ease-in, opacity 0.18s ease;
      cursor: pointer;
    }

    .pin.open .spread-slot {
      transform: translate(var(--tx), var(--ty)) scale(1);
      opacity: 1;
      pointer-events: auto;
      transition:
        transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1),
        opacity   0.3s  ease;
      transition-delay: calc(var(--i) * 0.05s);
    }

    .spread-card {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .spread-card img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    .pin-fan-card {
      position: absolute;
      inset: 0;
      overflow: hidden;
      transform-origin: bottom center;
      transform: rotate(0deg);
      transition: transform 0.22s ease;
    }

    .pin-fan-card:nth-child(1) { z-index: 1; }
    .pin-fan-card:nth-child(2) { z-index: 2; }

    .pin-fan-card img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    .pin:not(.open):hover .pin-fan-card:nth-child(1) { transform: rotate(-18deg); }
    .pin:not(.open):hover .pin-fan-card:nth-child(2) { transform: rotate(-9deg); }

    .pin-caption {
      position: absolute;
      top: 158px;
      left: 50%;
      transform: translateX(-50%) translateY(6px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      white-space: nowrap;
      z-index: 10;
    }

    .pin.captioned .pin-caption {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }

    .pin-caption a {
      display: inline-block;
      color: rgba(255, 255, 255, 0.92);
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.03em;
      text-decoration: none;
      background: rgba(10, 10, 10, 0.88);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.12);
      transition: background 0.15s ease;
    }

    .pin-caption a:hover {
      background: #fffbe6;
      color: #111;
    }

    .pin:hover {
      z-index: 1000;
    }

    .pin.open {
      z-index: 500;
    }

    .pin-tooltip {
      position: absolute;
      bottom: calc(100% + 16px);
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      color:#0d0d0d;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.02em;
      padding: 5px 10px;
      border-radius: 5px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease;
      border: 1px solid rgba(255,255,255,0.08);
      z-index: 9999;
    }

    .pin:not(.open):hover .pin-tooltip {
      opacity: 1;
    }

    #paper-plane {
      position: fixed;
      pointer-events: none;
      z-index: 10000;
      width: 84px;
      height: auto;
      top: 0;
      left: 0;
      transform: translate(-9999px, -9999px);
      will-change: transform;
    }

    #hint {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.28);
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      pointer-events: none;
      transition: opacity 1s ease;
    }

    #hint.hidden { opacity: 0; }

    /* ── Dark mode ── */
    html.dark body { background: #1a1a1a; }
    html.dark .nav-brand,
    html.dark .nav-title { color: rgba(255,255,255,0.65); }
    html.dark .nav-title:hover { background: rgba(255,255,255,0.06); }
    html.dark .nav-plus { color: #999; }
    html.dark .nav-plus:hover { background: rgba(255,255,255,0.06); }
    html.dark .nav-dropdown { background: #1c1c1c; border-color: rgba(255,255,255,0.1); }
    html.dark .nav-dropdown a { color: #999; }
    html.dark .nav-dropdown a:hover { background: rgba(255,255,255,0.06); color: #ddd; }
    html.dark .pin-tooltip { background: #222; color: #ccc; border-color: rgba(255,255,255,0.1); }
    html.dark #hint { color: rgba(255,255,255,0.2); }
    .site-footer { position: fixed; bottom: 0; left: 0; z-index: 40; display: flex; align-items: center; gap: 12px; padding: 12px 20px; font-size: 10px; font-weight: 300; color: rgba(0,0,0,0.32); letter-spacing: 0.04em; pointer-events: none; }
    .footer-social { display: flex; gap: 10px; align-items: center; pointer-events: auto; }
    .footer-social a { color: rgba(0,0,0,0.32); text-decoration: none; transition: color 0.15s; display: flex; align-items: center; }
    .footer-social a:hover { color: #111; }
    html.dark .site-footer { color: rgba(255,255,255,0.2); }
    html.dark .footer-social a { color: rgba(255,255,255,0.2); }
    html.dark .footer-social a:hover { color: #ccc; }
  </style>

  <script>
    // Navbar dropdown
    const navPlus = document.getElementById('navPlus');
    const navDropdown = document.getElementById('navDropdown');
    navPlus.addEventListener('click', e => {
      e.stopPropagation();
      navDropdown.classList.toggle('open');
    });
    document.addEventListener('click', () => navDropdown.classList.remove('open'));

    // ── Config ──────────────────────────────────────────────────────────────
    const MAP_ASPECT    = 1138.82 / 682.27;
    const NUM_COPIES    = 3;
    const MIN_ZOOM      = 2;
    const MAX_ZOOM      = 10;
    const FRICTION      = 0.91;
    const MIN_VEL       = 0.15;
    const DOT_RADIUS    = 1.0;
    const EASE          = 0.1;
    function dotColor() {
      return document.documentElement.classList.contains('dark')
        ? 'rgba(255,255,255,0.22)' : 'rgba(0,0,0,0.28)';
    }

    // Use shared data
    const PINS = PHOTOS;

    // ── State ────────────────────────────────────────────────────────────────
    const viewport = document.getElementById('viewport');
    const track    = document.getElementById('track');
    const loader   = document.getElementById('loader');
    const hint     = document.getElementById('hint');
    const canvas   = document.getElementById('map-canvas');
    const ctx      = canvas.getContext('2d');

    let dotData    = null;
    let dotCount   = 0;
    let zoom       = MIN_ZOOM;
    let targetZoom = MIN_ZOOM;
    let zoomFocalX = 0, zoomFocalY = 0;
    let baseMapWidth  = 0;
    let baseMapHeight = 0;
    let scrollX  = 0;
    let scrollY  = 0;
    let targetX  = 0;
    let targetY  = 0;
    let velX = 0, velY = 0;
    let dragging   = false;
    let dragStartX = 0, dragStartY = 0;
    let dragLastX  = 0, dragLastY  = 0, dragLastT = 0;
    let pinchDist  = 0, pinchCX = 0, pinchCY = 0;
    let rafId      = null;
    let needsRender = false;

    // ── Canvas setup ─────────────────────────────────────────────────────────
    const DPR = window.devicePixelRatio || 1;

    function resizeCanvas() {
      canvas.width  = Math.round(window.innerWidth  * DPR);
      canvas.height = Math.round(window.innerHeight * DPR);
      ctx.scale(DPR, DPR);
      needsRender = true;
    }

    function render() {
      if (!dotData) return;
      const vw = window.innerWidth;
      const vh = window.innerHeight;

      ctx.clearRect(0, 0, vw, vh);

      const mwz = baseMapWidth  * zoom;
      const mhz = baseMapHeight * zoom;
      const R   = DOT_RADIUS;
      const U16 = 65535;

      const yMin16 = Math.max(0,   Math.floor((scrollY - R)      / mhz * U16));
      const yMax16 = Math.min(U16, Math.ceil( (scrollY + vh + R) / mhz * U16));

      let lo = 0, hi = dotCount;
      while (lo < hi) {
        const mid = (lo + hi) >> 1;
        if (dotData[mid * 2 + 1] < yMin16) lo = mid + 1;
        else hi = mid;
      }

      ctx.fillStyle = dotColor();
      ctx.beginPath();

      for (let i = lo; i < dotCount; i++) {
        const dy = dotData[i * 2 + 1];
        if (dy > yMax16) break;

        const sy = dy / U16 * mhz - scrollY;
        const nx = dotData[i * 2] / U16;

        for (let k = 0; k < NUM_COPIES; k++) {
          const sx = (nx + k) * mwz - scrollX;
          if (sx < -R || sx > vw + R) continue;
          ctx.rect(sx - R, sy - R, R * 2, R * 2);
        }
      }

      ctx.fill();

      needsRender = false;
    }

    // ── Collision resolution ─────────────────────────────────────────────────
    // Pushes overlapping pin centres apart at min-zoom pixel space so no two
    // thumbnails overlap. Returns an array of {ox, oy} pixel corrections.
    function resolveOverlaps(pins, mapW, mapH) {
      const MIN_D = 58; // min centre-to-centre distance (50px thumb + 8px gap)
      const offsets = pins.map(() => ({ ox: 0, oy: 0 }));

      for (let iter = 0; iter < 120; iter++) {
        let moved = false;
        for (let i = 0; i < pins.length; i++) {
          for (let j = i + 1; j < pins.length; j++) {
            const xi = pins[i].x * mapW + offsets[i].ox;
            const yi = pins[i].y * mapH + offsets[i].oy;
            const xj = pins[j].x * mapW + offsets[j].ox;
            const yj = pins[j].y * mapH + offsets[j].oy;
            const dx = xi - xj, dy = yi - yj;
            const dist = Math.sqrt(dx * dx + dy * dy) || 0.01;
            if (dist < MIN_D) {
              const push = (MIN_D - dist) / 2;
              offsets[i].ox += (dx / dist) * push;
              offsets[i].oy += (dy / dist) * push;
              offsets[j].ox -= (dx / dist) * push;
              offsets[j].oy -= (dy / dist) * push;
              moved = true;
            }
          }
        }
        if (!moved) break;
      }
      return offsets;
    }

    // ── DOM helpers ──────────────────────────────────────────────────────────
    function createPin(pin, ox = 0, oy = 0) {
      const div = document.createElement('div');
      div.className  = 'pin';
      div.style.left = ox ? `calc(${pin.x * 100}% + ${ox}px)` : `${pin.x * 100}%`;
      div.style.top  = `calc(${pin.y * 100}% + ${200 + oy}px)`;

      const spread = document.createElement('div');
      spread.className = 'pin-spread';

      const images = (pin.images && pin.images.length) ? pin.images : Array(6).fill(pin.thumb);
      const RADIUS  = 90;

      for (let i = 0; i < 6; i++) {
        const angle = (i / 6) * 2 * Math.PI;
        const tx = Math.round(Math.sin(angle)  * RADIUS);
        const ty = Math.round(-Math.cos(angle) * RADIUS);

        const slot = document.createElement('div');
        slot.className = 'spread-slot';
        slot.style.setProperty('--tx', `${tx}px`);
        slot.style.setProperty('--ty', `${ty}px`);
        slot.style.setProperty('--i',  i);

        const src = images[i % images.length];
        const card = document.createElement('div');
        card.className = 'spread-card';
        const cardImg = document.createElement('img');
        cardImg.src = src; cardImg.draggable = false;
        card.appendChild(cardImg);
        slot.appendChild(card);

        slot.addEventListener('mousedown', e => { dragStartX = e.clientX; dragStartY = e.clientY; e.stopPropagation(); });
        slot.addEventListener('click', e => {
          e.stopPropagation();
          div.classList.add('captioned');
        });

        spread.appendChild(slot);
      }

      const caption = document.createElement('div');
      caption.className = 'pin-caption';
      const captionLink = document.createElement('a');
      captionLink.href = pin.url;
      captionLink.target = '_blank';
      captionLink.rel = 'noopener noreferrer';
      captionLink.textContent = pin.label;
      caption.appendChild(captionLink);
      captionLink.addEventListener('mousedown', e => { dragStartX = e.clientX; dragStartY = e.clientY; e.stopPropagation(); });
      captionLink.addEventListener('click',     e => e.stopPropagation());

      const tooltip = document.createElement('span');
      tooltip.className = 'pin-tooltip';
      tooltip.textContent = pin.label;

      const wrap = document.createElement('span');
      wrap.className = 'pin-thumb-wrap';

      for (let f = 0; f < 2; f++) {
        const fanCard = document.createElement('div');
        fanCard.className = 'pin-fan-card';
        const fanImg = document.createElement('img');
        fanImg.src = pin.thumb; fanImg.draggable = false;
        fanCard.appendChild(fanImg);
        wrap.appendChild(fanCard);
      }

      const img = document.createElement('img');
      img.src = pin.thumb; img.alt = pin.label;
      img.className = 'pin-thumb'; img.draggable = false;
      wrap.appendChild(img);

      wrap.addEventListener('mousedown', e => { dragStartX = e.clientX; dragStartY = e.clientY; e.stopPropagation(); });
      wrap.addEventListener('click', e => {
        e.stopPropagation();
        const ddx = e.clientX - dragStartX, ddy = e.clientY - dragStartY;
        if (ddx * ddx + ddy * ddy > 25) return;
        window.location.href = pin.url;
      });

      spread.addEventListener('mousedown',  e => { dragStartX = e.clientX; dragStartY = e.clientY; e.stopPropagation(); });
      caption.addEventListener('mousedown', e => { dragStartX = e.clientX; dragStartY = e.clientY; e.stopPropagation(); });

      const stem = document.createElement('span');
      stem.className = 'pin-stem';
      const dot = document.createElement('span');
      dot.className = 'pin-dot';

      div.appendChild(spread);
      div.appendChild(caption);
      div.appendChild(tooltip);
      div.appendChild(wrap);
      // div.appendChild(stem);
      // div.appendChild(dot);
      return div;
    }

    function buildTrack() {
      track.innerHTML = '';
      // Compute collision corrections at min-zoom pixel dimensions
      const mH = window.innerHeight * MIN_ZOOM;
      const mW = Math.floor(mH * MAP_ASPECT);
      const offsets = resolveOverlaps(PINS, mW, mH);
      for (let i = 0; i < NUM_COPIES; i++) {
        const instance = document.createElement('div');
        instance.className = 'map-instance';
        PINS.forEach((pin, idx) => instance.appendChild(createPin(pin, offsets[idx].ox, offsets[idx].oy)));
        track.appendChild(instance);
      }
    }

    // ── Data loading ─────────────────────────────────────────────────────────
    async function loadDots() {
      const resp = await fetch('dots.bin');
      const buf  = await resp.arrayBuffer();
      dotCount   = new DataView(buf).getUint32(0, true);
      dotData    = new Uint16Array(buf, 4);

      readMapDimensions();
      applyMapDimensions();
      targetZoom = zoom = MIN_ZOOM;
      zoomFocalX = window.innerWidth  / 2;
      zoomFocalY = window.innerHeight / 2;
      scrollX = targetX = baseMapWidth * zoom;
      scrollY = targetY = Math.max(0, (baseMapHeight * zoom - window.innerHeight) / 2);

      applyTransform(true);
      render();
      loader.classList.add('hidden');
      setTimeout(() => hint.classList.add('hidden'), 3500);
      startLoop();
    }

    // ── Dimensions ───────────────────────────────────────────────────────────
    function readMapDimensions() {
      baseMapHeight = window.innerHeight;
      baseMapWidth  = Math.floor(baseMapHeight * MAP_ASPECT);
    }

    function applyMapDimensions() {
      const w = Math.floor(baseMapWidth  * zoom) + 'px';
      const h = Math.floor(baseMapHeight * zoom) + 'px';
      track.style.height = h;
      document.querySelectorAll('.map-instance').forEach(el => {
        el.style.width = w; el.style.height = h;
      });
    }

    function zoomTo(newZoom, cx, cy) {
      targetZoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, newZoom));
      zoomFocalX = cx;
      zoomFocalY = cy;
    }

    // ── Scroll helpers ───────────────────────────────────────────────────────
    function normalise() {
      const mwz = baseMapWidth * zoom;
      if (targetX >= mwz * 2) { targetX -= mwz; scrollX -= mwz; }
      else if (targetX < mwz) { targetX += mwz; scrollX += mwz; }

      const maxY = Math.max(0, baseMapHeight * zoom - window.innerHeight);
      targetY = Math.max(0, Math.min(targetY, maxY));
    }

    function applyTransform(instant) {
      if (instant) track.style.transition = 'none';
      track.style.transform = `translate3d(${-scrollX}px, ${-scrollY}px, 0)`;
    }

    // ── rAF loop ─────────────────────────────────────────────────────────────
    function startLoop() {
      if (rafId) return;
      (function loop() {
        rafId = requestAnimationFrame(loop);
        let changed = needsRender;

        const dz = targetZoom - zoom;
        if (Math.abs(dz) > 0.0001) {
          const prev  = zoom;
          zoom       += dz * EASE;
          const ratio = zoom / prev;
          targetX = targetX * ratio + zoomFocalX * (ratio - 1);
          targetY = targetY * ratio + zoomFocalY * (ratio - 1);
          scrollX = scrollX * ratio + zoomFocalX * (ratio - 1);
          scrollY = scrollY * ratio + zoomFocalY * (ratio - 1);
          applyMapDimensions();
          changed = true;
        }

        if (!dragging) {
          velX *= FRICTION; velY *= FRICTION;
          if (Math.abs(velX) < MIN_VEL) velX = 0;
          if (Math.abs(velY) < MIN_VEL) velY = 0;
          targetX += velX; targetY += velY;
        }

        normalise();

        const dx = targetX - scrollX;
        const dy = targetY - scrollY;
        scrollX += dx * EASE;
        scrollY += dy * EASE;
        if (Math.abs(dx) > 0.05 || Math.abs(dy) > 0.05) changed = true;

        if (changed) { applyTransform(); render(); }
        needsRender = false;
      })();
    }

    // ── Mouse input ──────────────────────────────────────────────────────────
    viewport.addEventListener('mousedown', e => {
      dragging = true;
      dragStartX = dragLastX = e.clientX;
      dragStartY = dragLastY = e.clientY;
      dragLastT  = performance.now();
      velX = velY = 0;
      viewport.classList.add('dragging');
    });

    const paperPlane = document.getElementById('paper-plane');
    window.addEventListener('mousemove', e => {
      needsRender = true;
      paperPlane.style.transform = `translate(${e.clientX + 36}px, ${e.clientY - 64}px)`;

      if (!dragging) return;
      const now = performance.now(), dt = now - dragLastT || 1;
      const dx = e.clientX - dragLastX, dy = e.clientY - dragLastY;
      velX = -(dx / dt) * 16; velY = -(dy / dt) * 16;
      targetX -= dx; targetY -= dy;
      normalise();
      dragLastX = e.clientX; dragLastY = e.clientY; dragLastT = now;
    });


    window.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging = false;
      viewport.classList.remove('dragging');
    });

    viewport.addEventListener('click', e => {
      const dx = Math.abs(e.clientX - dragStartX);
      const dy = Math.abs(e.clientY - dragStartY);
      if (Math.sqrt(dx * dx + dy * dy) > 5) { e.preventDefault(); e.stopPropagation(); }
    }, true);

    // ── Touch input ──────────────────────────────────────────────────────────
    viewport.addEventListener('touchstart', e => {
      velX = velY = 0;
      if (e.touches.length === 2) {
        dragging = false;
        const dx = e.touches[1].clientX - e.touches[0].clientX;
        const dy = e.touches[1].clientY - e.touches[0].clientY;
        pinchDist = Math.sqrt(dx * dx + dy * dy);
        pinchCX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        pinchCY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      } else {
        dragging = true;
        dragStartX = dragLastX = e.touches[0].clientX;
        dragStartY = dragLastY = e.touches[0].clientY;
        dragLastT  = performance.now();
      }
    }, { passive: true });

    viewport.addEventListener('touchmove', e => {
      e.preventDefault();
      if (e.touches.length === 2) {
        const dx = e.touches[1].clientX - e.touches[0].clientX;
        const dy = e.touches[1].clientY - e.touches[0].clientY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        scrollX -= cx - pinchCX; scrollY -= cy - pinchCY;
        zoomTo(zoom * (dist / pinchDist), cx, cy);
        pinchDist = dist; pinchCX = cx; pinchCY = cy;
        return;
      }
      if (!dragging) return;
      const now = performance.now(), dt = now - dragLastT || 1;
      const dx = e.touches[0].clientX - dragLastX;
      const dy = e.touches[0].clientY - dragLastY;
      velX = -(dx / dt) * 16; velY = -(dy / dt) * 16;
      targetX -= dx; targetY -= dy;
      normalise();
      dragLastX = e.touches[0].clientX;
      dragLastY = e.touches[0].clientY;
      dragLastT = now;
    }, { passive: false });

    viewport.addEventListener('touchend', e => {
      if (!dragging) return;
      dragging = false;
      const dx = Math.abs(e.changedTouches[0].clientX - dragStartX);
      const dy = Math.abs(e.changedTouches[0].clientY - dragStartY);
      if (Math.sqrt(dx * dx + dy * dy) > 8) e.preventDefault();
    });

    // ── Wheel / trackpad ─────────────────────────────────────────────────────
    viewport.addEventListener('wheel', e => {
      e.preventDefault();
      if (e.ctrlKey) {
        zoomTo(zoom * Math.exp(-e.deltaY * 0.008), e.clientX, e.clientY);
      } else {
        velX = velY = 0;
        targetX += e.deltaX; targetY += e.deltaY;
        normalise();
      }
    }, { passive: false });

    // ── Resize ───────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      if (!baseMapWidth) return;
      const oldBW = baseMapWidth, oldBH = baseMapHeight;
      readMapDimensions();
      const rx = baseMapWidth / oldBW, ry = baseMapHeight / oldBH;
      scrollX *= rx; scrollY *= ry;
      targetX *= rx; targetY *= ry;
      targetZoom = zoom;
      applyMapDimensions();
      normalise();
      applyTransform(true);
      resizeCanvas();
      render();
    });

    document.addEventListener('themechange', () => { needsRender = true; });

    // ── Boot ─────────────────────────────────────────────────────────────────
    resizeCanvas();
    buildTrack();
    loadDots();
  </script>
</body>
</html>
